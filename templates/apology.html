{% extends "layout.html" %}

{% block title %}
    Apology
{% endblock %}

{% block main %}

<div class="container text-center">

    <div class="card shadow-lg p-5">

        <h1 class="text-danger mb-4">
            Oops! Something Went Wrong
        </h1>

        <p class="lead">
            The request could not be completed successfully.
            Please review the error message below.
        </p>

        <div class="my-4">

            <!-- Meme Image -->

            <img
                alt="{{ top }}"
                class="border img-fluid rounded shadow"
                src="https://api.memegen.link/images/custom/{{ top | urlencode }}/{{ bottom | urlencode }}.jpg?background=https://i.imgur.com/CsCgN7Ll.png&width=400"
                title="{{ top }}"
            >

        </div>

        <div class="mt-4">

            <h3 class="text-dark">
                Error {{ top }}
            </h3>

            <p class="text-muted">
                {{ bottom }}
            </p>

        </div>

        <div class="mt-4">

            <a href="/" class="btn btn-primary me-2">
                Return Home
            </a>

            <a href="/dashboard" class="btn btn-outline-dark">
                Go To Dashboard
            </a>

        </div>

    </div>

</div>

{% endblock %}
