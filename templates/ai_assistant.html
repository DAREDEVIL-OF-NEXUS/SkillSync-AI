{% extends "layout.html" %}

{% block title %}
    AI Assistant
{% endblock %}

{% block main %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow-lg p-4">

            <h2 class="text-center mb-4">
                AI Study Assistant
            </h2>

            <form action="/ai_assistant" method="post">

                <div class="mb-3">

                    <label class="form-label">
                        Subject
                    </label>

                    <input
                        class="form-control"
                        name="subject"
                        placeholder="e.g. Machine Learning"
                        type="text"
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Study Hours Per Day
                    </label>

                    <input
                        class="form-control"
                        name="hours"
                        placeholder="e.g. 2"
                        type="number"
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Difficulty Level
                    </label>

                    <select class="form-select" name="difficulty">

                        <option disabled selected>
                            Select Difficulty
                        </option>

                        <option>
                            Easy
                        </option>

                        <option>
                            Medium
                        </option>

                        <option>
                            Hard
                        </option>

                    </select>

                </div>

                <div class="d-grid">

                    <button class="btn btn-primary">
                        Generate Suggestion
                    </button>

                </div>

            </form>

        </div>

        {% if suggestion %}

        <div class="card shadow mt-4 p-4">

            <h3 class="text-success">
                AI Suggestion
            </h3>

            <p class="lead">
                {{ suggestion }}
            </p>

        </div>

        {% endif %}

    </div>

</div>

{% endblock %}
